<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SVG Gallery</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        padding: 20px;
    }

    h1 {
        text-align: center;
        color: #fff;
        margin-bottom: 20px;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 15px;
    }

    .card {
        background: #fff;
        border-radius: 12px;
        padding: 10px;
        text-align: center;
        transition: 0.3s;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .card:hover {
        transform: translateY(-5px);
    }

    img {
        width: 100%;
        height: 120px;
        object-fit: contain;
    }

    .name {
        margin-top: 8px;
        font-size: 13px;
        color: #333;
        word-break: break-all;
    }
</style>
</head>
<body>

<h1>🖼 SVG Gallery</h1>

<div class="grid" id="gallery"></div>

<script>
    // 👉 Add your SVG files here (auto-generate if needed)
    const files = [
        "America_Online_logo.svg",
        "ATM stroke test2.svg",
        "ATM test1.svg",
        "Blind Spot.svg"
    ];

    const gallery = document.getElementById("gallery");

    files.forEach(file => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <a href="${file}" target="_blank">
                <img src="${file}" alt="${file}">
            </a>
            <div class="name">${file}</div>
        `;

        gallery.appendChild(card);
    });
</script>

</body>
</html>
